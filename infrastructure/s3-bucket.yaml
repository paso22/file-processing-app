AWSTemplateFormatVersion: "2010-09-09"
Description: >
  S3 bucket for the file processor application.

# Parameters make templates reusable across environments.
# Instead of hardcoding "file-processor-dev", you pass the environment
# at deploy time and the bucket name is computed automatically.
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [ dev, test, prod ]
    Description: Deployment environment

  ApplicationName:
    Type: String
    Default: file-processor
    Description: Used to namespace all resource names

Resources:
  FileStorageBucket:
    Type: AWS::S3::Bucket
    # DeletionPolicy: what happens to this bucket when the CloudFormation
    # stack is deleted. "Delete" removes it (only works if the bucket is empty).
    # In production you'd use "Retain" to protect against accidental data loss.
    DeletionPolicy: Delete
    Properties:
      # No BucketName specified — we let AWS generate a unique name.
      # AWS appends a random suffix, guaranteeing global uniqueness across
      # all AWS accounts. Hardcoding a name risks "bucket already exists" errors.

      # Block all public access — files in this bucket should only be
      # accessible by your application, never by anonymous internet users.
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

      # Explicit encryption declaration ensures the intent survives any future
      # AWS default policy changes, even though SSE-S3 is the current default.
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

      # Versioning keeps previous versions of every object.
      # Not strictly necessary now, but teaches you nested property structure
      # and will matter when we process real files.
      VersioningConfiguration:
        Status: Enabled

      LifecycleConfiguration:
        Rules:
          # ExpirationInDays only expires the current version — it does not
          # remove non-current (previous) versions left behind by versioning.
          - Id: DeleteCurrentVersions
            Status: Enabled
            ExpirationInDays: 30

          # Without this rule, every overwritten or deleted object leaves a
          # non-current version that accumulates in S3 indefinitely.
          - Id: DeleteNoncurrentVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30

          # Interrupted multipart uploads leave orphaned parts that are billed
          # as storage. This rule cleans them up automatically.
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

      Tags:
        - Key: Application
          Value: !Ref ApplicationName
        - Key: Environment
          Value: !Ref Environment

# Outputs expose resource values to you (and future stacks).
# The bucket name is auto-generated by AWS (to guarantee global uniqueness),
# so without an Output you'd have to hunt for it in the console.
Outputs:
  BucketName:
    Description: The name of the created S3 bucket
    Value: !Ref FileStorageBucket
    # Export makes this value importable by OTHER CloudFormation stacks —
    # not needed now, but a good habit to establish early.
    Export:
      Name: !Sub "${AWS::StackName}-bucket-name"

  BucketArn:
    Description: ARN of the S3 bucket (needed for IAM policies in Phase 3)
    Value: !GetAtt FileStorageBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-bucket-arn"
